# ==============================================
# Cardnect Backend Application Configuration
# ==============================================

spring.application.name=cardnect-backend

# Server
server.port=8080

# ==============================================
# Database Configuration (PostgreSQL)
# ==============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/cardnect
spring.datasource.username=postgres
spring.datasource.password=your_postgres_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================
# JPA / Hibernate Configuration
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================================
# Clerk Configuration
# ==============================================
# Get from: https://clerk.com/docs/references/backend/overview
clerk.publishable-key=pk_test_YOUR_CLERK_PUBLISHABLE_KEY_HERE
clerk.jwks-url=https://api.clerk.com/v1/jwks

# ==============================================
# CORS Configuration
# ==============================================
cors.allowed-origins=http://localhost:5173

# ==============================================
# Logging
# ==============================================
logging.level.root=INFO
logging.level.com.cardnect=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

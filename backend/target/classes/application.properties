# ==============================================
# Cardnect Backend Application Configuration
# ==============================================

spring.application.name=cardnect-backend

# Server
server.port=8080

# ==============================================
# Database Configuration (Neon PostgreSQL)
# ==============================================
# Example:
# spring.datasource.url=jdbc:postgresql://ep-xxxx.ap-southeast-1.aws.neon.tech/cardnect?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cardnect}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================
# JPA / Hibernate Configuration
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# ==============================================
# Custom Auth / JWT Configuration
# ==============================================
auth.jwt.secret=${AUTH_JWT_SECRET:ZmFrZS1jaGFuZ2UtbWUtdG8tYS1wcm9wZXItMzItYnl0ZS1taW5pbXVtLXNlY3JldA==}
auth.jwt.expiration-minutes=${AUTH_JWT_EXPIRATION_MINUTES:10080}

# ==============================================
# Resend Email Configuration
# ==============================================
resend.enabled=${RESEND_ENABLED:false}
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:no-reply@cardnect.app}

# ==============================================
# CORS Configuration
# ==============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:80}

# ==============================================
# Logging
# ==============================================
logging.level.root=INFO
logging.level.com.cardnect=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
